name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend · tests del scoring
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-qualifier
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Suite completa: unitarios (stdlib puro) + integración de la API con
      # TestClient (necesita las dependencias reales del backend).
      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest

      - name: Ejecutar tests
        run: pytest -q

  frontend-typecheck:
    name: Frontend · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Comprobar tipos (tsc)
        run: npx tsc --noEmit
